<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./objetivos.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target" mindar-image-target="targetIndex: 0">
      <a-plane color="#000" height="0.2" width="0.5" opacity="0.5">
        <a-text value="Cargando ficha..." align="center" width="1"></a-text>
      </a-plane>
    </a-entity>
  </a-scene>

  <script>
    const targetEl = document.querySelector('#target');
    // Cuando detecta el cuadro (targetFound), redirige a la ficha
    targetEl.addEventListener("targetFound", event => {
      console.log("Cuadro detectado");
      window.location.href = "./ficha_artista.html"; 
    });
  </script>
</body>
</html>
