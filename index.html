<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 999; }
  </style>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./objetivos.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-plane color="#FFF" height="0.6" width="1" opacity="0.9" position="0 0 0"></a-plane>
      <a-text value="Plaza Mayor\nCargando datos..." color="#333" align="center" width="0.9" position="0 0 0.01"></a-text>
    </a-entity>
  </a-scene>
</body>
</html>
