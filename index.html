<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./objetivos.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <img id="ficha" src="ficha.jpg">
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-image src="#ficha" position="0 0 0.1" width="1" height="1.4"></a-image>
      
      <a-text value="Plaza Mayor de Salamanca" align="center" color="white" position="0 -0.8 0.1" width="2"></a-text>
    </a-entity>
    
  </a-scene>
</body>
</html>
